services:
  - type: web
    name: chiropractic-business-os-api
    runtime: node
    plan: free
    region: oregon
    branch: main
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: PRACTICE_NAME
        value: Client Chiropractic Practice
      - key: ADMIN_PASSWORD
        sync: false
      - key: AUTH_TOKEN_SECRET
        sync: false
      - key: BUSINESS_OS_DEMO_MODE
        value: false
      - key: INTERNAL_NOTIFICATION_EMAIL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
